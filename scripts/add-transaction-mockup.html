<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Transaction - SHARAKH OPS</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;700;900&family=Barlow+Condensed:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: 'Cairo', sans-serif; }
    body { background: #F4F5F7; display: flex; align-items: flex-end; }

    .bottom-sheet {
      width: 100%;
      max-width: 390px;
      background: #FFFFFF;
      border-top-left-radius: 32px;
      border-top-right-radius: 32px;
      box-shadow: 0 -8px 32px rgba(0, 0, 0, 0.12);
      padding: 20px 16px 32px;
      max-height: 90vh;
      overflow-y: auto;
      animation: slideUp 0.3s ease-out;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .sheet-handle {
      width: 40px;
      height: 4px;
      background: #E5E7EB;
      border-radius: 2px;
      margin: 0 auto 16px;
    }

    .sheet-title {
      font-size: 20px;
      font-weight: 900;
      color: #1A1A1A;
      margin-bottom: 20px;
      text-align: center;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: #1A1A1A;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .form-input, .form-select, .form-textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #E5E7EB;
      border-radius: 12px;
      font-size: 14px;
      font-family: 'Cairo', sans-serif;
      background: #F9FAFB;
      color: #1A1A1A;
      transition: all 0.2s;
    }

    .form-input:focus, .form-select:focus, .form-textarea:focus {
      outline: none;
      background: #FFFFFF;
      border-color: #FFCD11;
      box-shadow: 0 0 0 3px rgba(255, 205, 17, 0.1);
    }

    .form-textarea {
      resize: vertical;
      min-height: 80px;
    }

    .radio-group {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }

    .radio-option {
      flex: 1;
      position: relative;
    }

    .radio-option input {
      display: none;
    }

    .radio-label {
      display: block;
      padding: 12px 14px;
      border: 2px solid #E5E7EB;
      border-radius: 12px;
      text-align: center;
      cursor: pointer;
      font-weight: 700;
      font-size: 12px;
      color: #A0A0A0;
      transition: all 0.2s;
      background: #F9FAFB;
    }

    .radio-option input:checked + .radio-label {
      border-color: #FFCD11;
      background: #FFFBF0;
      color: #1A1A1A;
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: #FFCD11;
      color: #1A1A1A;
      border: none;
      border-radius: 12px;
      font-weight: 900;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 20px;
    }

    .submit-btn:hover {
      background: #FFD700;
    }

    .submit-btn:active {
      transform: scale(0.98);
    }

    .cancel-btn {
      width: 100%;
      padding: 12px;
      background: #F0F0F0;
      color: #A0A0A0;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      margin-top: 8px;
    }

    .amount-input {
      direction: ltr;
      text-align: left;
      font-family: 'Barlow Condensed', sans-serif;
    }

    .helper-text {
      font-size: 11px;
      color: #A0A0A0;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="bottom-sheet">
    <div class="sheet-handle"></div>
    <h2 class="sheet-title">إضافة عملية</h2>

    <form>
      <!-- TYPE SELECTOR -->
      <div class="form-group">
        <label class="form-label">نوع العملية</label>
        <div class="radio-group">
          <div class="radio-option">
            <input type="radio" id="income" name="type" value="income" checked>
            <label for="income" class="radio-label">📈 دخل</label>
          </div>
          <div class="radio-option">
            <input type="radio" id="expense" name="type" value="expense">
            <label for="expense" class="radio-label">📉 مصروف</label>
          </div>
        </div>
      </div>

      <!-- AMOUNT -->
      <div class="form-group">
        <label class="form-label">المبلغ (ر.س)</label>
        <input type="number" class="form-input amount-input" placeholder="0.00" value="850" step="0.01">
        <div class="helper-text">أدخل المبلغ بالريال السعودي</div>
      </div>

      <!-- CATEGORY -->
      <div class="form-group">
        <label class="form-label">الفئة</label>
        <select class="form-select">
          <option value="">اختر الفئة...</option>
          <option value="trip">نقل/رحلة</option>
          <option value="fuel">وقود</option>
          <option value="maintenance">صيانة</option>
          <option value="toll">رسوم</option>
          <option value="other">أخرى</option>
        </select>
      </div>

      <!-- DESCRIPTION -->
      <div class="form-group">
        <label class="form-label">الوصف</label>
        <textarea class="form-textarea" placeholder="أدخل وصف العملية...">نقل حي الملز - العاصمة</textarea>
        <div class="helper-text">اختياري: أضف ملاحظات عن العملية</div>
      </div>

      <!-- DATE -->
      <div class="form-group">
        <label class="form-label">التاريخ والوقت</label>
        <input type="datetime-local" class="form-input" value="2026-07-13T14:45">
      </div>

      <!-- SUBMIT -->
      <button type="submit" class="submit-btn">✓ حفظ العملية</button>
      <button type="button" class="cancel-btn">إلغاء</button>
    </form>
  </div>
</body>
</html>
